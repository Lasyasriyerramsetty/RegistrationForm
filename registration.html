<!DOCTYPE html>

<body >
    <div style="text-align: center; padding: 50px;">
    <h1>STUDENT REGISTRATION FORM</h1>
    <br/>
   <label for="password" class="form-label mb-3">Name: </label>
                    <input type="password" id="password" name="password"  required placeholder="Enter name">
                    <br/>
                       <br/>
     <div >
                    <label class="form-label">Gender</label><br>
                    <input type="radio" id="male" name="gender" value="male">
                    <label for="male">Male</label>
                    <input type="radio" id="female" name="gender" value="female">
                    <label for="female">Female</label>
                
            </div>
               <br/>
                <label for="add">Address: </label>
                 <br/>
                <textarea id="add" placeholder="Enter address"></textarea>
           <br/>   <br/>
            <div class="ddl">
                <label for="branch">Select Branch</label>
                <select id="branch" name="branch">
                    <option value="CSE"> CSE</option>
                     <option value="ECE"> ECE</option>
                      <option value="EEE"> EEE</option>
                       <option value="IT"> IT</option>
                </select>

            </div> <br/>
            <div class="cb"> 
                <p>Languages known: </p>
                <input type="checkbox" id="C" value="C">
                <label for="C"> C</label>
                 <input type="checkbox" id="cpp" value="cpp">
                <label for="cpp"> CPP</label>

                 <input type="checkbox" id="py" value="py">
                <label for="py"> Python</label>
            </div> <br/>
            <label for="resume">Resume</p>
            <input id="resume" type="file">

</div>
</body>
